server:
  port: 8080

spring:
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

  datasource:
    url: jdbc:mariadb://localhost:3306/mini_groupware
    username: root
    password: ""
    driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.wooseok.minigroupware.domain
  configuration:
    map-underscore-to-camel-case: true
